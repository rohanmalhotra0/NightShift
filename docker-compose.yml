version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=sqlite:///./nightshift.db
    env_file:
      - .env
    volumes:
      - ./backend:/app
      - ./uploads:/app/uploads
      - ./nightshift.db:/app/nightshift.db
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    depends_on:
      - playwright

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://backend:8000
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    command: npm run dev

  playwright:
    image: mcr.microsoft.com/playwright:v1.42.0-jammy
    command: sleep infinity
    shm_size: 2gb

volumes:
  uploads:
